<script>
	var rootWindow = getRootWindow();
	if(rootWindow != null && (typeof rootWindow.showSessionTimeOutErrorMessage == 'function')) {
		rootWindow.showSessionTimeOutErrorMessage("The session was inactive for too long.\nYou were logged off automatically.");
	} else {
	  document.location="index.aweb"; 
	}
	
	if (window.opener) {
		window.close();
	} 
	if (window.parent && window.parent.opener) {
	     window.parent.close();
	     actionTaken = true;
	}
	
	function getRootWindow() {
		var rootWindow = null;
		var openerWindow = window.opener;
		while(openerWindow) {
			if(openerWindow.opener) {
				openerWindow = openerWindow.opener; 
			} else {
				if(openerWindow.parent && openerWindow.parent.window) {
					rootWindow = openerWindow.parent.window;
				}
				openerWindow = null;
			}
		}
		if(rootWindow == null) {
			if (parent && parent.window) { // if it is not a popup then it is in frame
				rootWindow = parent.window;
			}
		}
		return rootWindow;		
	}
