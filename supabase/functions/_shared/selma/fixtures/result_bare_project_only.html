// Get comma separated list of selected key values

                selection += ',';

// Refresh the target window that initiated the post search action, show DWR message if available
function refreshPostActionTarget(data, selectionParam)
{
    var extraParam = '';
    var post_action = '';
    var post_action_target = '';
    var post_action_url = '';
    var msg = data.toString();
    if (msg)
    {
        alert(msg);
    }

    if (post_action_target == '_top')
    {
        var topWin = window.open('', 'content_RKbaDys7hIVJYVrs');
        if (topWin)
        {
            topWin.location = post_action_url;

        }
        window.close();
        return;
    }

    if (post_action_target == 'explorerWindow' || post_action_target == 'assetExplorerWindow')
    {
        var topWin = window.open('', post_action_target);
        if (topWin)
        {
            topWin.location = post_action_url;

        }
        window.close();
        return;
    }
    // Open target window and check if the global variable is available from the originator
    var targetWin = window.open('', post_action_target);
    if ((targetWin.globalWindowIdentifier && targetWin.globalWindowIdentifier == post_action) || targetWin.name == post_action_target)
    {
        if (selectionParam)
        {
            extraParam = selectionParam;
        }
        window.open(post_action_url + extraParam, post_action_target);
    }
    else
    {
        // If the other window just opened is empty then close it
        if (targetWin.document.getElementsByTagName("body")[0].childNodes.length == 0)
        {
            targetWin.close();
        }
    }
    window.close();
}

<script type="text/javascript">
    (function ( $ ) {

        $( document ).ready( function () {

            // Add handler for IE to copy selected cell text to clipboard upon ctrl+c (only needed for ActiveWidgets on IE)
            if (typeof window.clipboardData != 'undefined')
            {
                $(document).keydown(function(e) {
                    if(e.ctrlKey && e.which == '67' ) {
                            if (window.status) {
                                var txt = '' + window.status;
                                // Copy outside of main thread, otherwise empty
                                setTimeout(function(){
                                    try {
                                        window.clipboardData.setData('text', txt );
                                    } catch (ignore) { }
                                },10);
                            }
                    }
                });
            }

            /**
             * TODO: this is a temporary fix to add the select checkbox back into the list for select screens.
             * The checkbox is removed by the result controller for file systems other that ADC and PDC.
             * But in a select screen the checkbox must be there off course.
             */
            function fixSelectCheckBoxOnSelectScreens()
            {
                var post_action = document.getElementById('post_action');
                if (post_action && docsGrid)
                {
                    var indices = docsGrid.getColumnIndices();
                    if (indices[0] != 0)
                    {
                        indices.unshift(0);     // At column index 0 to start of array to show the checkbox
                        docsGrid.setColumnIndices(indices);
                        docsGrid.setColumnCount(indices.length);
                        return true;
                    }
                }
                return false;
            }

            if (fixSelectCheckBoxOnSelectScreens())
            {
                ASSAI.customizeGridColumns(docsGrid, columns, 'apply');
            }

        });

    })( jQuery );
    
</script>
<script>

var ldrv_status_descriptions = '{"statuses":[{"code":"L","description":"Loaded"},{"code":"M","description":"Loaded in Portal"},{"code":"R","description":"Rejected"},{"code":"S","description":"Rejected in Portal"},{"code":"T","description":"Rejected by DC"},{"code":"P","description":"Processed"},{"code":"Q","description":"Processed in Portal"},{"code":"V","description":"Review by DC"}]}';
var ldrv_status_obj = JSON.parse(ldrv_status_descriptions);
function getLdrvStatusDescriptionOf( code )
{
	if (code === 'P') {
		return Label.getLabel("received");
	}
	else {
	    for ( var i = 0; i < ldrv_status_obj.statuses.length; i++) {
		    if (ldrv_status_obj.statuses[i].code===code) {
			    return ldrv_status_obj.statuses[i].description;
			}
	    }
	    return "";
	}
}

function setFileIcon(filsSeqNrIndex, iconIndex, row) {
	var fils_seq_nr_icon = docsGrid.getCellText(filsSeqNrIndex, row);
	if (fils_seq_nr_icon == null || fils_seq_nr_icon == "") {
		docsGrid.setCellText("", iconIndex, row)
	}
	else {
		var imgSrc = "src='img/icons/" + fils_seq_nr_icon.substring(fils_seq_nr_icon.indexOf(";")+1).toLowerCase() + ".gif'";
//		console.log("<img " + imgSrc + ">");
		docsGrid.setCellText("<img " + imgSrc + ">", iconIndex, row)
		docsGrid.setCellText(fils_seq_nr_icon.substring(0,fils_seq_nr_icon.indexOf(";")), filsSeqNrIndex, row)
	}
}

if (docsGridHeader.getColumnIndexOf("REDL_FILE_STATUS"))
{
	var rowCount               = docsGrid.getRowCount();
	var redl_pub_file_index    = docsGridHeader.getColumnIndexOf("PUBLICATION_FILS_SEQ_NR");
	var redl_markup_file_index = docsGridHeader.getColumnIndexOf("REDLINE_MARKUP_FILS_SEQ_NR");
	columns[publicationFileColumnIndex]=Label.getLabel("redl_inbox_publication_file");
	columns[redlineMarkupFilesColumnIndex]=Label.getLabel("redl_inbox_redline_markup_files");
    docsGrid.setHeaderText(columns);
    
    for (var row = 0; row < rowCount; row++ )
	{
    	setFileIcon(redl_pub_file_index, publicationFileColumnIndex, row);
    	setFileIcon(redl_markup_file_index, redlineMarkupFilesColumnIndex, row);
    	docsGrid.refresh();
	}
}

if (docsGridHeader.getColumnIndexOf("LDRV_STATUS_DESCRIPTION"))
{
	
	var rowCount               = docsGrid.getRowCount();
	var ldrv_status_index      = docsGridHeader.getColumnIndexOf("LDRV_STATUS");
	var ldrv_status_desc_index = docsGridHeader.getColumnIndexOf("LDRV_STATUS_DESCRIPTION");
	var ldrv_status_display_col = ldrv_status_desc_index; 
	var clnt_source_file_index      = docsGridHeader.getColumnIndexOf("CLNT_SOURCE_FILE");
	var clnt_publication_file_index = docsGridHeader.getColumnIndexOf("CLNT_PUBLICATION_FILE");
	var clnt_comments_file_index    = docsGridHeader.getColumnIndexOf("CLNT_COMMENTS_FILE");
	var clnt_other_file_index       = docsGridHeader.getColumnIndexOf("CLNT_OTHER_FILE");
	var clnt_redline_markup_file_index       = docsGridHeader.getColumnIndexOf("CLNT_REDLINE_MARKUP_FILE");
	
	// fils_seq_nr of ldrv files
	var ldrv_source_file_index      = docsGridHeader.getColumnIndexOf("SOURCE_FILS_SEQ_NR");
	var ldrv_publication_file_index = docsGridHeader.getColumnIndexOf("PUBLICATION_FILS_SEQ_NR");
	var ldrv_comment_file_index    = docsGridHeader.getColumnIndexOf("COMMENT_FILS_SEQ_NR");
	var ldrv_other_file_index    = docsGridHeader.getColumnIndexOf("OTHER_FILS_SEQ_NR");
	var ldrv_seq_nr_index      = docsGridHeader.getColumnIndexOf("LDRV_SEQ_NR");
//	var dore_seq_nr_index      = docsGridHeader.getColumnIndexOf("DORE_SEQ_NR");
	var ldrv_remarks_index     = docsGridHeader.getColumnIndexOf("LOAD_REMARKS");
//	var dore_entt_seq_nr       = "1";

    var source_file_ind_index       = docsGridHeader.getColumnIndexOf("SOURCE_FILE_IND");
    var publication_file_ind_index  = docsGridHeader.getColumnIndexOf("PUBLICATION_FILE_IND");
    var comments_file_ind_index     = docsGridHeader.getColumnIndexOf("COMMENTS_FILE_IND");
    var other_file_ind_index        = docsGridHeader.getColumnIndexOf("OTHER_FILE_IND");
    var redline_markup_file_ind_index        = docsGridHeader.getColumnIndexOf("REDLINE_MARKUP_FILE_IND");
    
    // added to place a info icon on this column which opens inc trx detailscreen
    var rcpt_seq_nr_index = docsGridHeader.getColumnIndexOf("RCPT_SEQ_NR");
    var inc_trx_info_index = docsGridHeader.getColumnIndexOf("INC_TRX_ICON");

    columns[publicationFileColumnIndex]=Label.getLabel("publication_file");
    columns[sourceFileColumnIndex]=Label.getLabel("source_file");
    columns[commentFileColumnIndex]=Label.getLabel("comment_file");
    columns[otherFilesColumnIndex]=Label.getLabel("other_files");
    docsGrid.setHeaderText(columns);

	if (typeof clnt_source_file_index == "undefined") 
		clnt_source_file_index = -1;
	if (typeof clnt_publication_file_index == "undefined") 
		clnt_publication_file_index = -1;
	if (typeof clnt_comments_file_index == "undefined") 
		clnt_comments_file_index = -1;
	if (typeof other_file_index == "undefined") 
		other_file_index = -1;
	function getStatusBGColor(pLdrStatus, pLdrRemarks) {
		if (pLdrStatus === "P" || pLdrStatus === "Q")
		{
			return "#EC6E09";
		}
		else if (pLdrStatus === "R" || pLdrStatus === "S") {
			// if remarks is empty (network / server error)
			if (typeof pLdrRemarks != "undefined" && (pLdrRemarks === "" || pLdrRemarks.endsWith("Data processed"))) {
				return "#EC6E09";
			}
			return "red";	
		}
	}
	var trxIcon = "src='img/i.gif'";
	for (var row = 0; row < rowCount; row++ )
	{
		//set icons
		setFileIcon(ldrv_publication_file_index, publicationFileColumnIndex, row);
		setFileIcon(ldrv_source_file_index, sourceFileColumnIndex, row);
		setFileIcon(ldrv_comment_file_index, commentFileColumnIndex, row);
		setFileIcon(ldrv_other_file_index, otherFilesColumnIndex, row);
		
		docsGrid.setCellText("<img " + trxIcon + ">", inc_trx_info_index, row);

//		var fils_seq_nr_icon = docsGrid.getCellText(ldrv_publication_file_index, row);
//		if (fils_seq_nr_icon == null || fils_seq_nr_icon == "") {
//			docsGrid.setCellText("", publicationFileColumnIndex, row)
//		}
//		else {
//			docsGrid.setCellText(getFileIcon(fils_seq_nr_icon.substring(fils_seq_nr_icon.indexOf(",")+1)), publicationFileColumnIndex, row)
//			docsGrid.setCellText(fils_seq_nr_icon.substring(0,fils_seq_nr_icon.indexOf(",")), ldrv_publication_file_index, row)
//		}
				
		var lStatus = docsGrid.getCellText(ldrv_status_index, row);
		// replace the code by the (translated) description
		docsGrid.setCellText(getLdrvStatusDescriptionOf(lStatus), ldrv_status_display_col, row);

		docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("background", (lStatus==="P"||lStatus==="Q")?"green":(lStatus=="R"||lStatus=="S"||lStatus=="T")?"red":"#DDDDFF");
		docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("color", (lStatus=="P"||lStatus=="Q")?"white":(lStatus=="R"||lStatus=="S"||lStatus=="T")?"white":"black");
		
		var loaderRmks = docsGrid.getCellText(ldrv_remarks_index, row );
		//Added to show DC comments when the ldrv status is "code:T,description:Rejected by DC" 
 		if(lStatus !== "T"){
 			docsGrid.setCellText("",ldrv_remarks_index, row )
 		}
 	   if (lStatus === "R" || lStatus === "S" || lStatus === "P" || lStatus === "Q")
 	   {
 		   // Initial todo background colors 
		   var publication_file_ind = docsGrid.getCellText(publication_file_ind_index, row);
		   var source_file_ind      = docsGrid.getCellText(source_file_ind_index, row);
		   var comments_file_ind    = docsGrid.getCellText(comments_file_ind_index, row);


 		   if (clnt_source_file_index != -1) {
 			   if (source_file_ind == "Y") {
 			       docsGrid.getCellTemplate(clnt_source_file_index,row).setStyle("background-color", "#CFC");
 			   }
 			   else if (loaderRmks.indexOf("Source file")!= -1 || docsGrid.getCellText(clnt_source_file_index, row) != "") {
 			       docsGrid.getCellTemplate(sourceFileColumnIndex,row).setStyle("background-color", "#FCC");
 			       docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("background", getStatusBGColor(lStatus, loaderRmks)); // Orange, to distinguish between metadata fail and file upload fail
 	               docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("color", "white");	   
 	           }
 		   }
 		   if (clnt_publication_file_index != -1) {
 			   if (publication_file_ind == "Y") {
 			       docsGrid.getCellTemplate(clnt_publication_file_index,row).setStyle("background-color", "#CFC");
 		       }
 		       else if (loaderRmks.indexOf("Publication file")!=-1 || docsGrid.getCellText(clnt_publication_file_index, row) != "") {
 			       docsGrid.getCellTemplate(publicationFileColumnIndex,row).setStyle("background-color", "#FCC");
 			       docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("background", getStatusBGColor(lStatus, loaderRmks)); // Orange, to distinguish between metadata fail and file upload fail
 	               docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("color", "white");	   
 			   }
 		   }
 		   if (clnt_comments_file_index != -1) {
 			   if (comments_file_ind == "Y") {
 			       docsGrid.getCellTemplate(clnt_comments_file_index,row).setStyle("background-color", "#CFC");
 		       }
 		       else if (loaderRmks.indexOf("Comments file") != -1 || docsGrid.getCellText(clnt_comments_file_index, row) != "") {
 			       docsGrid.getCellTemplate(commentFileColumnIndex,row).setStyle("background-color", "#FCC");
 			       docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("background", getStatusBGColor(lStatus, loaderRmks)); // Orange, to distinguish between metadata fail and file upload fail
 	               docsGrid.getCellTemplate(ldrv_status_display_col,row).setStyle("color", "white");
 		       }
 		   }
 	   }
		docsGrid.refresh();
	}
}
</script>
